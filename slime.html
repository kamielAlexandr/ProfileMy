<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Голодная Бездна: Эволюция</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0a0a0a; overflow: hidden; font-family: sans-serif; user-select: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #stats { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px 4px #000; }
        .stat-line { font-size: 20px; margin-bottom: 5px; }
        .hint { font-size: 14px; color: #ffeb3b; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="stats">
            <div class="stat-line" id="load-text">Вместимость: 0 / 15</div>
            <div class="stat-line" id="crystals-text">Тёмные кристаллы: 0</div>
            <div class="stat-line" id="dash-text">Рывок: Готов!</div>
            <div class="hint">Управление: Левый клик/Тап - Движение<br>Правый клик (или два пальца) - РЫВОК</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const WORLD_SIZE = 2000;
        let camera = { x: 0, y: 0 };

        // Игрок теперь с механикой рывка
        let player = {
            x: WORLD_SIZE / 2, y: WORLD_SIZE / 2 + 200,
            radius: 20, baseRadius: 20,
            speed: 250, dashSpeed: 800,
            targetX: WORLD_SIZE / 2, targetY: WORLD_SIZE / 2 + 200,
            color: '#32cd32',
            load: 0, maxLoad: 15, crystals: 0,
            isDashing: false, dashCooldown: 0, dashDuration: 0
        };

        let portal = { x: WORLD_SIZE / 2, y: WORLD_SIZE / 2, radius: 70, pulse: 0 };
        let entities = [];
        const MAX_ENTITIES = 150;

        const loadText = document.getElementById('load-text');
        const crystalsText = document.getElementById('crystals-text');
        const dashText = document.getElementById('dash-text');

        // Спавн "Живой" добычи
        function spawnEntities() {
            entities = [];
            for (let i = 0; i < MAX_ENTITIES; i++) {
                let rx = Math.random() * WORLD_SIZE;
                let ry = Math.random() * WORLD_SIZE;
                if (Math.hypot(rx - portal.x, ry - portal.y) > 250) {
                    entities.push({
                        x: rx, y: ry, size: 12 + Math.random() * 8,
                        color: Math.random() > 0.3 ? '#8b4513' : '#4682b4', // Деревяшки и "Живые" (синие)
                        isAlive: Math.random() > 0.5, // Половина добычи - живая (убегает)
                        vx: 0, vy: 0, active: true
                    });
                }
            }
        }
        spawnEntities();

        function setTarget(clientX, clientY) {
            player.targetX = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, clientX - width / 2 + player.x));
            player.targetY = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, clientY - height / 2 + player.y));
        }

        // Движение левым кликом
        canvas.addEventListener('pointermove', (e) => { if(e.buttons === 1) setTarget(e.clientX, e.clientY); });
        canvas.addEventListener('pointerdown', (e) => {
            if(e.button === 0) setTarget(e.clientX, e.clientY); // ЛКМ
            if(e.button === 2) activateDash(); // ПКМ - Рывок
        });
        canvas.addEventListener('contextmenu', e => e.preventDefault()); // Отключаем меню браузера

        function activateDash() {
            if (player.dashCooldown <= 0) {
                player.isDashing = true;
                player.dashDuration = 0.2; // Рывок длится 0.2 секунды
                player.dashCooldown = 2.0; // Перезарядка 2 секунды
                // Рывок сжигает 1 единицу массы, если она есть
                if (player.load > 0) { player.load--; updateRadius(); }
            }
        }

        function updateUI() {
            loadText.innerText = `Вместимость: ${player.load} / ${player.maxLoad}`;
            crystalsText.innerText = `Тёмные кристаллы: ${player.crystals}`;
            if (player.dashCooldown > 0) {
                dashText.innerText = `Рывок: Зарядка (${player.dashCooldown.toFixed(1)}с)`;
                dashText.style.color = '#ff5555';
            } else {
                dashText.innerText = `Рывок: ГОТОВ! (ПКМ)`;
                dashText.style.color = '#55ff55';
            }
        }

        function updateRadius() { player.radius = player.baseRadius + (player.load * 1.5); }

        let lastTime = 0;
        let gameTime = 0;

        function gameLoop(timestamp) {
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = timestamp; gameTime += dt;
            update(dt); draw();
            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            // Управление рывком
            if (player.dashDuration > 0) player.dashDuration -= dt;
            else player.isDashing = false;
            
            if (player.dashCooldown > 0) {
                player.dashCooldown -= dt;
                if(player.dashCooldown <= 0) updateUI();
            }

            const currentSpeed = player.isDashing ? player.dashSpeed : player.speed;
            
            // Движение игрока
            const dx = player.targetX - player.x;
            const dy = player.targetY - player.y;
            const distance = Math.hypot(dx, dy);

            if (distance > 5) {
                const moveDist = currentSpeed * dt;
                if (moveDist > distance) { player.x = player.targetX; player.y = player.targetY; } 
                else { player.x += (dx / distance) * moveDist; player.y += (dy / distance) * moveDist; }
            }

            // Поведение добычи и поглощение
            if (player.load < player.maxLoad || player.isDashing) {
                for (let i = 0; i < entities.length; i++) {
                    let res = entities[i];
                    if (!res.active) continue;

                    const distToRes = Math.hypot(player.x - res.x, player.y - res.y);
                    
                    // Логика страха (Живая добыча убегает от слайма)
                    if (res.isAlive && distToRes < 200) {
                        const fleeDx = res.x - player.x;
                        const fleeDy = res.y - player.y;
                        const fleeDist = Math.hypot(fleeDx, fleeDy);
                        res.vx = (fleeDx / fleeDist) * 150; // Скорость убегания
                        res.vy = (fleeDy / fleeDist) * 150;
                    } else {
                        res.vx *= 0.9; res.vy *= 0.9; // Трение
                    }

                    // Применяем скорость к добыче
                    res.x += res.vx * dt; res.y += res.vy * dt;
                    // Ограничение по краям карты для добычи
                    res.x = Math.max(0, Math.min(WORLD_SIZE, res.x));
                    res.y = Math.max(0, Math.min(WORLD_SIZE, res.y));

                    // Поедание
                    if (distToRes < player.radius + res.size / 2) {
                        if(player.load < player.maxLoad) {
                            res.active = false;
                            player.load++;
                            updateRadius();
                            updateUI();
                        }
                    }
                }
            }

            // Сдача в портал
            const distToPortal = Math.hypot(player.x - portal.x, player.y - portal.y);
            if (distToPortal < portal.radius + player.radius && player.load > 0 && !player.isDashing) {
                player.load -= 1;
                player.crystals += 5;
                updateRadius();
                portal.pulse = 1.5;
                updateUI();
            }
            if (portal.pulse > 0) portal.pulse = Math.max(0, portal.pulse - dt * 2);

            camera.x = player.x - width / 2; camera.y = player.y - height / 2;
            if(player.dashCooldown > 0 || player.dashDuration > 0) updateUI();
        }

        function draw() {
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, width, height);
            ctx.save(); ctx.translate(-camera.x, -camera.y);

            // Сетка мира
            ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
            for(let i=0; i<=WORLD_SIZE; i+=100) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i); ctx.stroke();
            }

            // Отрисовка добычи
            for (let i = 0; i < entities.length; i++) {
                let res = entities[i];
                if (res.active) {
                    ctx.fillStyle = res.color;
                    ctx.beginPath();
                    if(res.isAlive) ctx.arc(res.x, res.y, res.size/2, 0, Math.PI*2); // Круглые живые
                    else ctx.rect(res.x - res.size/2, res.y - res.size/2, res.size, res.size); // Квадратный мусор
                    ctx.fill();
                }
            }

            // Портал
            const pulseScale = 1 + (Math.sin(gameTime * 3) * 0.05) + (portal.pulse * 0.2);
            const currentRadius = portal.radius * pulseScale;
            const gradient = ctx.createRadialGradient(portal.x, portal.y, currentRadius * 0.5, portal.x, portal.y, currentRadius * 2);
            gradient.addColorStop(0, '#000000'); gradient.addColorStop(0.5, '#8a2be2'); gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(portal.x, portal.y, currentRadius * 2, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(portal.x, portal.y, currentRadius * 0.6, 0, Math.PI * 2); ctx.fill();

            // Слайм
            ctx.fillStyle = player.isDashing ? '#adff2f' : player.color; // Яркий при рывке
            ctx.beginPath();
            const stretch = (player.speed > 0 || player.isDashing) ? (player.isDashing ? 1.4 : 1.1) : 1;
            ctx.ellipse(player.x, player.y, player.radius, player.radius * stretch, Math.atan2(player.targetY - player.y, player.targetX - player.x), 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        updateUI();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
