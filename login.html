<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethelforge | Вход</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Aethelforge</div>
        <ul class="nav-links">
            <li><a href="index.html">Обо мне</a></li>
            <li><a href="games.html">Мои игры</a></li>
            <li><a href="tutor.html">ОГЭ / ЕГЭ</a></li>
            <li><a href="play.html">Играть онлайн</a></li>
            <li id="authNavItem"><a href="login.html" class="active">Войти</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="auth-container">
            <h1 id="authTitle">Вход в Цитадель</h1>
            <p id="authSubtitle">Введите свои данные для доступа к играм и достижениям.</p>
            
            <form id="authForm" class="auth-form">
                <input type="email" id="emailInput" placeholder="Ваш Email" required>
                <input type="password" id="passwordInput" placeholder="Пароль (минимум 6 символов)" required>
                
                <div id="authError" class="auth-error hidden"></div>
                
                <button type="submit" id="submitBtn" class="game-btn">Войти</button>
            </form>

            <div class="auth-toggle">
                <span id="toggleText">Еще не в гильдии?</span> 
                <a href="#" id="toggleMode">Зарегистрироваться</a>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
</body>
</html>
