<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 PRO-ИГРЫ: 5 полностью рабочих шедевров</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e, #1a1f2e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .game-icon {
            font-size: 3em;
        }

        .game-title {
            font-size: 1.8em;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }

        .btn {
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(78, 205, 196, 0.3);
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
        }

        .btn-success {
            background: linear-gradient(45deg, #00b894, #00cec9);
        }

        .game-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
        }

        .display-zone {
            font-size: 2em;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            margin: 10px 0;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #00cec9);
            transition: width 0.3s;
        }

        input {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #4ecdc4;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.1em;
            width: 100%;
            margin: 10px 0;
        }

        .grid-3x3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .grid-cell:hover {
            background: rgba(78, 205, 196, 0.3);
            transform: scale(1.05);
        }

        .grid-cell.selected {
            background: #4ecdc4;
            color: black;
        }

        .badge {
            background: #ff6b6b;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 PRO-ИГРЫ: ТОП 5 РАБОЧИХ ХИТОВ</h1>
        
        <div class="games-grid">
            <!-- ИГРА 1: УГАДАЙ ЧИСЛО (ПРОДВИНУТАЯ) -->
            <div class="game-card">
                <div class="game-header">
                    <span class="game-icon">🔢</span>
                    <span class="game-title">УГАДАЙ ЧИСЛО 2.0</span>
                </div>
                <div class="game-area">
                    <div class="display-zone" id="guessDisplay">❓</div>
                    <div style="text-align: center; margin: 10px 0;">
                        <span class="badge" id="attemptsBadge">Попыток: 0</span>
                        <span class="badge" id="rangeBadge">Диапазон: 1-100</span>
                    </div>
                    <input type="number" id="guessInput" placeholder="Введи число" min="1" max="100">
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-success" style="flex: 1;" onclick="makeGuessPro()">ПРОВЕРИТЬ</button>
                        <button class="btn btn-danger" style="flex: 1;" onclick="resetGuessPro()">НОВАЯ ИГРА</button>
                    </div>
                    <div id="guessMessage" style="text-align: center; margin-top: 15px; min-height: 40px;"></div>
                    
                    <!-- История попыток -->
                    <div style="margin-top: 20px;">
                        <h4>📜 История:</h4>
                        <div id="guessHistory" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
                    </div>
                </div>
            </div>

            <!-- ИГРА 2: КРЕСТИКИ-НОЛИКИ С ИИ -->
            <div class="game-card">
                <div class="game-header">
                    <span class="game-icon">❌⭕</span>
                    <span class="game-title">КРЕСТИКИ-НОЛИКИ PRO</span>
                </div>
                <div class="game-area">
                    <div style="text-align: center; margin-bottom: 10px;">
                        <span id="tictac-turn" style="font-size: 1.3em;">Твой ход (❌)</span>
                    </div>
                    <div class="grid-3x3" id="tictac-grid">
                        <!-- Заполняется JS -->
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="btn" onclick="resetTicTac()">🔄 Новая игра</button>
                        <button class="btn btn-danger" onclick="switchSide()">🤖 vs 🤖</button>
                    </div>
                    <div id="tictac-score" style="margin-top: 15px; display: flex; justify-content: space-around;">
                        <span>Ты: <span id="playerWins">0</span></span>
                        <span>ИИ: <span id="aiWins">0</span></span>
                        <span>Ничьи: <span id="draws">0</span></span>
                    </div>
                </div>
            </div>

            <!-- ИГРА 3: ТЕТРИС-СТАЙЛ (ПАДАЮЩИЕ БЛОКИ) -->
            <div class="game-card">
                <div class="game-header">
                    <span class="game-icon">🧩</span>
                    <span class="game-title">ПАДАЮЩИЕ БЛОКИ</span>
                </div>
                <div class="game-area">
                    <div style="display: flex; gap: 20px; align-items: center;">
                        <div>
                            <canvas id="tetrisCanvas" width="200" height="400" style="background: black; border-radius: 10px;"></canvas>
                        </div>
                        <div style="flex: 1;">
                            <div class="display-zone" style="font-size: 1.5em;" id="tetrisScore">0</div>
                            <div style="margin: 10px 0;">Уровень: <span id="tetrisLevel">1</span></div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="tetrisProgress" style="width: 0%;"></div>
                            </div>
                            <button class="btn btn-success" style="width: 100%;" onclick="startTetris()">▶ СТАРТ</button>
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px;">
                                <button class="btn" style="padding: 10px;" onclick="moveLeft()">←</button>
                                <button class="btn" style="padding: 10px;" onclick="rotate()">↻</button>
                                <button class="btn" style="padding: 10px;" onclick="moveRight()">→</button>
                                <button class="btn" style="grid-column: span 3;" onclick="hardDrop()">⬇ ПАДАТЬ ⬇</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ИГРА 4: МЕМОРИ-ТРЕНИРОВКА -->
            <div class="game-card">
                <div class="game-header">
                    <span class="game-icon">🧠</span>
                    <span class="game-title">ТРЕНИРОВКА ПАМЯТИ</span>
                </div>
                <div class="game-area">
                    <div id="memoryDisplay" class="display-zone" style="font-size: 4em;">👁️</div>
                    <div style="text-align: center; margin: 10px 0;">Уровень: <span id="memoryLevel">1</span></div>
                    <div class="grid-3x3" id="memoryGrid"></div>
                    <button class="btn btn-success" style="width: 100%; margin-top: 15px;" onclick="startMemoryGame()">▶ НАЧАТЬ</button>
                    <div id="memoryMessage" style="text-align: center; margin-top: 10px;"></div>
                </div>
            </div>

            <!-- ИГРА 5: МАТЕМАТИЧЕСКИЙ ТРЕНАЖЕР -->
            <div class="game-card">
                <div class="game-header">
                    <span class="game-icon">➕</span>
                    <span class="game-title">МАТЕМАТИЧЕСКИЙ ТРЕНАЖЕР</span>
                </div>
                <div class="game-area">
                    <div class="display-zone" id="mathQuestion" style="font-size: 3em;">5 + 3 = ?</div>
                    <input type="number" id="mathAnswer" placeholder="Твой ответ" onkeypress="if(event.key==='Enter') checkMathAnswer()">
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-success" style="flex: 1;" onclick="checkMathAnswer()">✅ ПРОВЕРИТЬ</button>
                        <button class="btn" style="flex: 1;" onclick="newMathQuestion()">🔄 НОВЫЙ</button>
                    </div>
                    <div style="margin-top: 20px;">
                        <div>Правильно: <span id="mathCorrect">0</span></div>
                        <div>Ошибок: <span id="mathWrong">0</span></div>
                        <div>Точность: <span id="mathAccuracy">0%</span></div>
                    </div>
                    <div class="progress-bar" style="margin-top: 10px;">
                        <div class="progress-fill" id="mathProgress" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== ИГРА 1: УГАДАЙ ЧИСЛО 2.0 ====================
        let secretNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;
        let minRange = 1;
        let maxRange = 100;
        let guessHistory = [];

        function makeGuessPro() {
            const input = document.getElementById('guessInput');
            const guess = parseInt(input.value);
            
            if (isNaN(guess)) {
                showMessage('Введи число!', '#ff6b6b');
                return;
            }
            
            attempts++;
            guessHistory.push(guess);
            
            // Адаптивный диапазон
            if (guess < secretNumber && guess > minRange) minRange = guess + 1;
            if (guess > secretNumber && guess < maxRange) maxRange = guess - 1;
            
            let message = '';
            let color = '#fff';
            
            if (guess === secretNumber) {
                message = `🎉 ПОБЕДА! Число ${secretNumber} угадано за ${attempts} попыток!`;
                color = '#00b894';
                document.getElementById('guessDisplay').textContent = secretNumber;
                
                // Новая игра через 2 секунды
                setTimeout(() => {
                    resetGuessPro();
                    showMessage('Загадано новое число!', '#4ecdc4');
                }, 2000);
            } else if (guess < secretNumber) {
                message = `⬆️ Больше чем ${guess}`;
                color = '#fdcb6e';
                document.getElementById('guessDisplay').textContent = '⬆️';
            } else {
                message = `⬇️ Меньше чем ${guess}`;
                color = '#e17055';
                document.getElementById('guessDisplay').textContent = '⬇️';
            }
            
            // Обновление UI
            showMessage(message, color);
            document.getElementById('attemptsBadge').textContent = `Попыток: ${attempts}`;
            document.getElementById('rangeBadge').textContent = `Диапазон: ${minRange}-${maxRange}`;
            
            // История
            updateGuessHistory();
            
            input.value = '';
            input.focus();
        }

        function updateGuessHistory() {
            const history = document.getElementById('guessHistory');
            history.innerHTML = guessHistory.slice(-10).map(g => 
                `<span style="background: #4ecdc4; padding: 5px 10px; border-radius: 10px;">${g}</span>`
            ).join('');
        }

        function resetGuessPro() {
            secretNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            minRange = 1;
            maxRange = 100;
            guessHistory = [];
            document.getElementById('guessDisplay').textContent = '❓';
            document.getElementById('attemptsBadge').textContent = 'Попыток: 0';
            document.getElementById('rangeBadge').textContent = 'Диапазон: 1-100';
            document.getElementById('guessHistory').innerHTML = '';
            showMessage('Новая игра! Загадано число 1-100', '#4ecdc4');
        }

        function showMessage(msg, color) {
            document.getElementById('guessMessage').innerHTML = msg;
            document.getElementById('guessMessage').style.color = color;
        }

        // ==================== ИГРА 2: КРЕСТИКИ-НОЛИКИ ====================
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let vsAI = true;
        let playerWins = 0, aiWins = 0, draws = 0;

        function renderTicTac() {
            const grid = document.getElementById('tictac-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.textContent = board[i];
                if (board[i] === 'X') cell.style.color = '#ff6b6b';
                if (board[i] === 'O') cell.style.color = '#4ecdc4';
                cell.onclick = () => makeMove(i);
                grid.appendChild(cell);
            }
            document.getElementById('tictac-turn').textContent = gameActive ? 
                (currentPlayer === 'X' ? 'Твой ход (❌)' : 'Ход ИИ (⭕)') : 'Игра окончена';
        }

        function makeMove(index) {
            if (!gameActive || board[index] !== '' || (vsAI && currentPlayer === 'O')) return;
            
            board[index] = currentPlayer;
            checkGameStatus();
            
            if (gameActive && vsAI && currentPlayer === 'X') {
                currentPlayer = 'O';
                renderTicTac();
                setTimeout(aiMove, 500);
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                renderTicTac();
            }
        }

        function aiMove() {
            if (!gameActive) return;
            
            // Умный ИИ
            let move = findBestMove();
            if (move === -1) {
                // Случайный ход если нет умного
                const empty = board.reduce((acc, cell, idx) => cell === '' ? [...acc, idx] : acc, []);
                if (empty.length > 0) {
                    move = empty[Math.floor(Math.random() * empty.length)];
                }
            }
            
            if (move !== -1) {
                board[move] = 'O';
                checkGameStatus();
                if (gameActive) {
                    currentPlayer = 'X';
                }
                renderTicTac();
            }
        }

        function findBestMove() {
            // Проверка победного хода
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'O';
                    if (checkWin('O')) {
                        board[i] = '';
                        return i;
                    }
                    board[i] = '';
                }
            }
            
            // Блокировка хода игрока
            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'X';
                    if (checkWin('X')) {
                        board[i] = '';
                        return i;
                    }
                    board[i] = '';
                }
            }
            
            return -1;
        }

        function checkWin(player) {
            const winPatterns = [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ];
            
            return winPatterns.some(pattern => 
                pattern.every(index => board[index] === player)
            );
        }

        function checkGameStatus() {
            if (checkWin('X')) {
                gameActive = false;
                playerWins++;
                document.getElementById('playerWins').textContent = playerWins;
                showMessage('Ты победил!', '#00b894');
            } else if (checkWin('O')) {
                gameActive = false;
                aiWins++;
                document.getElementById('aiWins').textContent = aiWins;
                showMessage('ИИ победил!', '#ff6b6b');
            } else if (!board.includes('')) {
                gameActive = false;
                draws++;
                document.getElementById('draws').textContent = draws;
                showMessage('Ничья!', '#fdcb6e');
            }
        }

        function resetTicTac() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            renderTicTac();
        }

        function switchSide() {
            vsAI = !vsAI;
            resetTicTac();
            showMessage(vsAI ? 'Режим: Игрок vs ИИ' : 'Режим: Игрок vs Игрок', '#4ecdc4');
        }

        // ==================== ИГРА 3: ТЕТРИС ====================
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d');
        const COLS = 10;
        const ROWS = 20;
        const cellSize = 20;
        
        let tetrisBoard = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let tetrisScore = 0;
        let tetrisLevel = 1;
        let tetrisActive = false;
        let tetrisInterval;
        
        const PIECES = [
            { shape: [[1,1,1,1]], color: '#00b894' }, // I
            { shape: [[1,1],[1,1]], color: '#fdcb6e' }, // O
            { shape: [[1,1,1],[0,1,0]], color: '#6c5ce7' }, // T
            { shape: [[1,1,1],[1,0,0]], color: '#e17055' }, // L
            { shape: [[1,1,1],[0,0,1]], color: '#0984e3' }, // J
            { shape: [[1,1,0],[0,1,1]], color: '#d63031' }, // S
            { shape: [[0,1,1],[1,1,0]], color: '#fdcb6e' } // Z
        ];
        
        let currentPiece = null;
        let pieceX = 3, pieceY = 0;

        function drawTetris() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Отрисовка сетки
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvas.width, i * cellSize);
                ctx.stroke();
            }
            
            // Отрисовка доски
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (tetrisBoard[y][x]) {
                        ctx.fillStyle = tetrisBoard[y][x];
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize - 1, cellSize - 1);
                    }
                }
            }
            
            // Отрисовка текущей фигуры
            if (currentPiece) {
                ctx.fillStyle = currentPiece.color;
                currentPiece.shape.forEach((row, dy) => {
                    row.forEach((value, dx) => {
                        if (value) {
                            ctx.fillRect((pieceX + dx) * cellSize, (pieceY + dy) * cellSize, cellSize - 1, cellSize - 1);
                        }
                    });
                });
            }
        }

        function spawnPiece() {
            const piece = PIECES[Math.floor(Math.random() * PIECES.length)];
            currentPiece = piece;
            pieceX = Math.floor((COLS - piece.shape[0].length) / 2);
            pieceY = 0;
            
            if (collision()) {
                gameOver();
            }
        }

        function collision() {
            return currentPiece.shape.some((row, dy) => {
                return row.some((value, dx) => {
                    if (value) {
                        const newX = pieceX + dx;
                        const newY = pieceY + dy;
                        return newX < 0 || newX >= COLS || newY >= ROWS || (newY >= 0 && tetrisBoard[newY][newX]);
                    }
                    return false;
                });
            });
        }

        function mergePiece() {
            currentPiece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) {
                        tetrisBoard[pieceY + dy][pieceX + dx] = currentPiece.color;
                    }
                });
            });
            
            // Удаление заполненных линий
            let linesCleared = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                if (tetrisBoard[y].every(cell => cell !== 0)) {
                    tetrisBoard.splice(y, 1);
                    tetrisBoard.unshift(Array(COLS).fill(0));
                    y++;
                    linesCleared++;
                }
            }
            
            if (linesCleared > 0) {
                tetrisScore += linesCleared * 100 * tetrisLevel;
                document.getElementById('tetrisScore').textContent = tetrisScore;
                
                // Уровень растет
                tetrisLevel = Math.floor(tetrisScore / 500) + 1;
                document.getElementById('tetrisLevel').textContent = tetrisLevel;
                
                // Прогресс
                const progress = (tetrisScore % 500) / 5;
                document.getElementById('tetrisProgress').style.width = progress + '%';
            }
            
            spawnPiece();
        }

        function moveDown() {
            if (!currentPiece) return;
            pieceY++;
            if (collision()) {
                pieceY--;
                mergePiece();
            }
            drawTetris();
        }

        function moveLeft() {
            if (!currentPiece) return;
            pieceX--;
            if (collision()) pieceX++;
            drawTetris();
        }

        function moveRight() {
            if (!currentPiece) return;
            pieceX++;
            if (collision()) pieceX--;
            drawTetris();
        }

        function rotate() {
            if (!currentPiece) return;
            const rotated = {
                shape: currentPiece.shape[0].map((_, i) => currentPiece.shape.map(row => row[i]).reverse()),
                color: currentPiece.color
            };
            
            const originalShape = currentPiece.shape;
            currentPiece.shape = rotated.shape;
            
            if (collision()) {
                currentPiece.shape = originalShape;
            }
            
            drawTetris();
        }

        function hardDrop() {
            while (!collision()) {
                pieceY++;
            }
            pieceY--;
            mergePiece();
            drawTetris();
        }

        function gameOver() {
            tetrisActive = false;
            clearInterval(tetrisInterval);
            showMessage('Игра окончена! Счёт: ' + tetrisScore, '#ff6b6b');
        }

        function startTetris() {
            if (tetrisActive) {
                clearInterval(tetrisInterval);
            }
            tetrisBoard = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            tetrisScore = 0;
            tetrisLevel = 1;
            tetrisActive = true;
            document.getElementById('tetrisScore').textContent = '0';
            document.getElementById('tetrisLevel').textContent = '1';
            spawnPiece();
            drawTetris();
            
            tetrisInterval = setInterval(() => {
                if (tetrisActive) {
                    moveDown();
                }
            }, 500 / tetrisLevel);
        }

        // ==================== ИГРА 4: МЕМОРИ ====================
        let memorySequence = [];
        let memoryIndex = 0;
        let memoryLevel = 1;
        let memoryPlaying = false;

        function startMemoryGame() {
            memorySequence = [];
            memoryIndex = 0;
            memoryPlaying = true;
            
            // Генерация последовательности
            for (let i = 0; i < 3 + memoryLevel; i++) {
                memorySequence.push(Math.floor(Math.random() * 9));
            }
            
            // Показ последовательности
            let i = 0;
            const interval = setInterval(() => {
                if (i < memorySequence.length) {
                    highlightCell(memorySequence[i]);
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('memoryDisplay').textContent = '👆';
                        createMemoryGrid();
                    }, 500);
                }
            }, 800);
        }

        function highlightCell(index) {
            document.getElementById('memoryDisplay').textContent = index + 1;
            const cells = document.querySelectorAll('#memoryGrid .grid-cell');
            cells.forEach((cell, i) => {
                if (i === index) {
                    cell.style.background = '#4ecdc4';
                    setTimeout(() => cell.style.background = '', 300);
                }
            });
        }

        function createMemoryGrid() {
            const grid = document.getElementById('memoryGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.textContent = i + 1;
                cell.onclick = () => checkMemory(i);
                grid.appendChild(cell);
            }
        }

        function checkMemory(index) {
            if (!memoryPlaying) return;
            
            if (index === memorySequence[memoryIndex]) {
                memoryIndex++;
                if (memoryIndex === memorySequence.length) {
                    memoryPlaying = false;
                    memoryLevel++;
                    document.getElementById('memoryLevel').textContent = memoryLevel;
                    document.getElementById('memoryMessage').innerHTML = '🎉 МОЛОДЕЦ! Уровень повышен!';
                    setTimeout(startMemoryGame, 1000);
                }
            } else {
                memoryPlaying = false;
                document.getElementById('memoryMessage').innerHTML = '❌ Ошибка! Игра окончена';
                setTimeout(() => {
                    memoryLevel = 1;
                    document.getElementById('memoryLevel').textContent = '1';
                    document.getElementById('memoryMessage').innerHTML = '';
                }, 2000);
            }
        }

        // ==================== ИГРА 5: МАТЕМАТИКА ====================
        let mathCorrect = 0;
        let mathWrong = 0;
        let mathAnswer = 0;

        function newMathQuestion() {
            const operations = ['+', '-', '×', '÷'];
            const op = operations[Math.floor(Math.random() * 4)];
            let num1, num2;
            
            switch(op) {
                case '+':
                    num1 = Math.floor(Math.random() * 50) + 1;
                    num2 = Math.floor(Math.random() * 50) + 1;
                    mathAnswer = num1 + num2;
                    break;
                case '-':
                    num1 = Math.floor(Math.random() * 50) + 20;
                    num2 = Math.floor(Math.random() * num1);
                    mathAnswer = num1 - num2;
                    break;
                case '×':
                    num1 = Math.floor(Math.random() * 12) + 1;
                    num2 = Math.floor(Math.random() * 12) + 1;
                    mathAnswer = num1 * num2;
                    break;
                case '÷':
                    num2 = Math.floor(Math.random() * 10) + 1;
                    mathAnswer = Math.floor(Math.random() * 10) + 1;
                    num1 = num2 * mathAnswer;
                    break;
            }
            
            document.getElementById('mathQuestion').textContent = `${num1} ${op} ${num2} = ?`;
            document.getElementById('mathAnswer').value = '';
        }

        function checkMathAnswer() {
            const userAnswer = parseInt(document.getElementById('mathAnswer').value);
            
            if (userAnswer === mathAnswer) {
                mathCorrect++;
                newMathQuestion();
            } else {
                mathWrong++;
            }
            
            document.getElementById('mathCorrect').textContent = mathCorrect;
            document.getElementById('mathWrong').textContent = mathWrong;
            
            const total = mathCorrect + mathWrong;
            const accuracy = total > 0 ? Math.round((mathCorrect / total) * 100) : 0;
            document.getElementById('mathAccuracy').textContent = accuracy + '%';
            document.getElementById('mathProgress').style.width = accuracy + '%';
        }

        // Инициализация
        renderTicTac();
        createMemoryGrid();
        newMathQuestion();
        resetGuessPro();
        startTetris();
    </script>
</body>
</html>
